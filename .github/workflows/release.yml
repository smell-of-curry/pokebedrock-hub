name: Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Linux binary
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags "-s -w" -o pokebedrock-hub .

      - name: Build Windows binary
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags "-s -w" -o pokebedrock-hub.exe .

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v0.1.${{ github.run_number }}
          name: v0.1.${{ github.run_number }}
          generate_release_notes: true
          files: |
            pokebedrock-hub
            pokebedrock-hub.exe
